# Build the Astro site and deploy to GitHub Pages on every push to main.
# This uses the official GitHub Pages deployment action (no gh-pages branch).
#
# Settings → Pages must be set to "Source: GitHub Actions" for the first deploy
# to succeed. After that, pushes to main rebuild and redeploy automatically.

name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one in-flight deploy at a time; cancel queued ones so a fast follow-up
# push doesn't overwrite a newer build.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
